# ================================================================================
# sumo3Dviz Visualization Configuration Template
# ================================================================================
# This template provides all configuration parameters needed to run a 3D
# visualization of a SUMO traffic simulation. All file paths should be relative
# to the current working directory where the render script is executed.
# ================================================================================

# ================================================================================
# RENDERING PARAMETERS (REQUIRED)
# ================================================================================
# Configuration for video output and rendering settings
rendering:
  # Whether to record the visualization as a video file
  # If true, video_width_px, and video_height_px are required
  # If false, only an interactive window will be shown
  record_video: true

  # Whether a window should be shown during rendering
  # Set to false for headless mode (faster rendering, no display)
  # Set to true to see the visualization while it renders
  headless: false

  # Video width in pixels (REQUIRED if record_video is true)
  # Common resolutions: 1920 (Full HD), 1280 (HD), 1140 (custom)
  video_width_px: 1920

  # Video height in pixels (REQUIRED if record_video is true)
  # Common resolutions: 1080 (Full HD), 720 (HD), 900 (custom)
  video_height_px: 1080

  # Video frame rate in frames per second (ALWAYS REQUIRED)
  # Typical values: 24, 25, 30, or 60 fps
  video_fps: 25.0

# ================================================================================
# VISUALIZATION PARAMETERS (REQUIRED)
# ================================================================================
# Configuration for visual elements and scene composition
visualization:
  # Whether to render other vehicles in the scene besides the ego vehicle
  show_other_vehicles: true

  # Whether to render traffic signals in the scene
  show_signals: true

  # Width of each road lane in meters (typically 3.0-3.5m)
  lane_width: 3.2

  # Width of lane separation lines in meters
  sep_line_width: 0.2

  # ======================================
  # Tree rendering parameters
  # ======================================
  # Scale factor for small trees (lower values = smaller trees)
  tree_scale_1: 0.2

  # Scale factor for large trees (lower values = smaller trees)
  tree_scale_2: 0.5

  # Random variation in tree sizes (0.0 = no variation, 1.0 = normal variation)
  tree_size_variability: 1.0

  # Random variation in tree colors (0.0 = no variation, 0.1 = subtle variation)
  tree_color_variability: 0.1

  # ======================================
  # Sky texture selection (REQUIRED)
  # ======================================
  # Choose the sky appearance for the scene
  # Available options:
  #   - sky_blue: Clear blue sky
  #   - sky_cloudy: Partly cloudy daytime sky
  #   - sky_overcast: Overcast/gray sky
  #   - sky_dawn: Dawn/dusk colors
  #   - sky_night_stars: Night sky with stars
  #   - sky_night_clear: Clear night sky
  #   - sky_night_forest: Night sky over forest
  #   - sky_night_desert: Night sky over desert
  #   - sky_halloween: Halloween-themed sky
  sky_texture: "sky_cloudy"

  # ======================================
  # Ground texture selection (REQUIRED)
  # ======================================
  # Choose the ground surface appearance
  # Available options:
  #   - ground_grass: Natural grass texture
  #   - ground_stone: Stone texture
  #   - ground_sand: Sand texture
  #   - ground_chess: Chess board pattern (small)
  #   - ground_chesslarge: Chess board pattern (large)
  #   - ground_halloween: Halloween-themed ground
  ground_texture: "ground_grass"

  # Camera/viewer height above ground level in meters
  # Relevant for Lagrangian mode (vehicle-following camera)
  # Typical values: 1.5m (sitting in car), 2.0m (standing), 10.0m (aerial view)
  viewer_height: 1.5

# ================================================================================
# PATH PARAMETERS (REQUIRED)
# ================================================================================
# All file paths referenced by the visualization
paths:
  # Path to the SUMO FCD (Floating Car Data) output XML file containing vehicle positions
  # This file is generated by SUMO with the --fcd-output option
  trajectory_file: "path/to/simulation_logs/vehicle_positions.xml"

  # Path to the SUMO network file (.net.xml) defining the road network
  sumo_network_file: "path/to/network.net.xml"

  # Path to the XML file containing traffic signal state changes over time
  # This file logs when signals change between red/yellow/green
  traffic_signal_states_file: "path/to/simulation_logs/signal_states.xml"

  # ======================================
  # Optional environment element files
  # ======================================
  # The following files are OPTIONAL - if not needed, you can omit these lines
  # or leave them empty. The renderer will skip them if the files don't exist.

  # Path to XML file defining highway fence/barrier positions
  fence_lines_file: "path/to/viz_object_positions/fences.add.xml"

  # Path to XML file defining shop/commercial building positions
  shops_positions_file: "path/to/viz_object_positions/buildings_shops.add.xml"

  # Path to XML file defining residential home positions
  homes_positions_file: "path/to/viz_object_positions/buildings_homes.add.xml"

  # Path to XML file defining large building block positions
  blocks_positions_file: "path/to/viz_object_positions/buildings_blocks.add.xml"

  # Path to XML file defining tree positions in the environment
  tree_positions_file: "path/to/viz_object_positions/trees.add.xml"

# ================================================================================
# TRAFFIC SIGNAL PARAMETERS (OPTIONAL)
# ================================================================================
# Configuration for traffic light and ramp metering visualization
signals:
  # Traffic light design type
  # Available options:
  #   - simple: Basic two-light ramp metering (red/green)
  #   - three_headed: Standard three-light traffic signal (red/yellow/green)
  #   - countdown_timer: Ramp metering with countdown display
  signal_design: "three_headed"

  # Physical positions of traffic lights
  # Define an array of traffic light positions, each with a unique identifier
  traffic_light_positions: [
      {
        # Unique identifier for this traffic light (should match ID in SUMO network)
        "id": "tl_junction_id_1",
        # X coordinate of traffic light position in the SUMO network
        "pos_x": 0.0,
        # Y coordinate of traffic light position in the SUMO network
        "pos_y": 0.0,
        # Coordinates defining the stop line (where vehicles must stop)
        # These four values define two points (a,b) and (c,d) for the line endpoints
        "stop_line_a": 0.0,
        "stop_line_b": 0.0,
        "stop_line_c": 0.0,
        "stop_line_d": 0.0,
      },
      # Add additional traffic lights as needed:
      # {
      #   "id": "tl_junction_id_2",
      #   "pos_x": 0.0,
      #   "pos_y": 0.0,
      #   "stop_line_a": 0.0,
      #   "stop_line_b": 0.0,
      #   "stop_line_c": 0.0,
      #   "stop_line_d": 0.0,
      # },
    ]

# ================================================================================
# MODE SPECIFIC PARAMETERS (REQUIRED)
# ================================================================================
# Configuration for different visualization modes
# Choose one mode to use when running the visualization
modes:
  # ======================================
  # EULERIAN MODE
  # ======================================
  # Fixed camera position (bird's eye view or fixed perspective)
  # The camera stays at a specified position while vehicles move through the scene
  eulerian:
    # Start time of the simulation segment to visualize (in seconds)
    simtime_start: 0.0

    # End time of the simulation segment to visualize (in seconds)
    simtime_end: 100.0

    # Unique identifier of the ego vehicle (the main vehicle to track/highlight)
    # This should match a vehicle ID in the trajectory file
    ego_identifier: "vehicle_id_here"

    # Fixed camera position and orientation
    camera_position:
      # Camera X position in SUMO network coordinates
      pos_x: 0.0
      # Camera Y position in SUMO network coordinates
      pos_y: 0.0
      # Camera Z position (height above ground in meters)
      pos_z: 10.0
      # Camera heading/yaw angle in degrees (0=North, 90=East, 180=South, 270=West)
      ori_h: 90.0
      # Camera pitch angle in degrees (negative = looking down, positive = looking up)
      ori_p: -10.0
      # Camera roll angle in degrees (rotation around forward axis)
      ori_r: 0.0

  # ======================================
  # LAGRANGIAN MODE
  # ======================================
  # Camera follows the ego vehicle from behind (driving perspective)
  # This creates a view as if you're following the vehicle
  lagrangian:
    # Start time of the simulation segment to visualize (in seconds)
    simtime_start: 0.0

    # End time of the simulation segment to visualize (in seconds)
    simtime_end: 100.0

    # Unique identifier of the ego vehicle to follow
    # This should match a vehicle ID in the trajectory file
    ego_identifier: "vehicle_id_here"

  # ======================================
  # CINEMATIC MODE
  # ======================================
  # Camera moves along a predefined trajectory with smooth transitions
  # Define keyframe positions at specific times, and the camera will interpolate between them
  cinematic:
    # Start time of the simulation segment to visualize (in seconds)
    simtime_start: 0.0

    # End time of the simulation segment to visualize (in seconds)
    simtime_end: 100.0

    # Unique identifier of the ego vehicle (the main vehicle to track/highlight)
    # This should match a vehicle ID in the trajectory file
    ego_identifier: "vehicle_id_here"

    # Camera trajectory defined as keyframes at specific simulation times
    # The camera will smoothly interpolate between these positions
    # Add as many keyframes as needed (minimum 2)
    camera_position_trajectory:
      # Keyframe at simulation time 0.0 seconds
      "0.0":
        pos_x: 0.0
        pos_y: 0.0
        pos_z: 30.0
        ori_h: 90.0
        ori_p: -20.0
        ori_r: 0.0
      # Keyframe at simulation time 50.0 seconds
      "50.0":
        pos_x: 100.0
        pos_y: 100.0
        pos_z: 20.0
        ori_h: 45.0
        ori_p: -15.0
        ori_r: 0.0
      # Keyframe at simulation time 100.0 seconds
      "100.0":
        pos_x: 200.0
        pos_y: 200.0
        pos_z: 10.0
        ori_h: 0.0
        ori_p: -10.0
        ori_r: 0.0
      # Add more keyframes as needed for complex camera movements

  # ======================================
  # INTERACTIVE MODE
  # ======================================
  # Free camera control with keyboard and mouse
  # Use WASD keys to move, mouse to look around
  interactive:
    # Initial camera position when the interactive mode starts
    initial_camera_position:
      # Starting position as [x, y, z] in SUMO network coordinates
      # Default: [120, -20, 0]
      position: [0, 0, 50]

      # Starting orientation as [heading, pitch, roll] in degrees
      # Default: [180, 0, 0]
      orientation: [90, -10, 0]
