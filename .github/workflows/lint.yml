name: Type Checking & Linting

on:
    push:
        branches:
            - main
            - dev
    pull_request:
        types: [opened, synchronize]

jobs:
    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Set up Python 3.9
              uses: actions/setup-python@v6
              with:
                  python-version: "3.9"
            - name: Install Black
              run: pip install "black~=24.10"
            - name: Check formatting with Black
              run: black --check --verbose .
    lint:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: [3.9]
        steps:
            - uses: actions/checkout@v5
            - name: Set up Python 3.9
              uses: actions/setup-python@v6
              with:
                  python-version: 3.9
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"
            - name: Run python linting for entire source directory
              run: pylint src --errors-only
            - name: Run python linting for entire examples directory
              run: pylint examples --errors-only
