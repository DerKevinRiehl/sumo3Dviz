# ================================================================================
# SUMO 3D Visualization Configuration Template
# ================================================================================
# This template provides all configuration parameters needed to run a 3D
# visualization of a SUMO traffic simulation. All file paths should be relative
# to the current working directory where the render script is executed.
# ================================================================================

# ================================================================================
# TRAJECTORY PARAMETERS (REQUIRED)
# ================================================================================
# Configuration for loading and processing vehicle trajectory data from SUMO
trajectory_parameters:
  # Path to the SUMO FCD (Floating Car Data) output XML file containing vehicle positions
  # This file is generated by SUMO with the --fcd-output option
  trajectory_file: "path/to/simulation_logs/vehicle_positions.xml"

  # Unique identifier of the ego vehicle (the vehicle from whose perspective we render)
  # This should match a vehicle ID in the trajectory file
  ego_identifier: "vehicle_id_here"

  # Path to the SUMO network file (.net.xml) defining the road network
  sumo_network_file: "path/to/network.net.xml"

  # Width of each road lane in meters (typically 3.0-3.5m)
  lane_width: 3.2

  # Width of lane separation lines in meters
  sep_line_width: 0.2

  # Start time of the simulation segment to visualize (in seconds)
  simtime_start: 0.0

  # End time of the simulation segment to visualize (in seconds)
  simtime_end: 100.0

# ================================================================================
# VIDEO PARAMETERS (REQUIRED)
# ================================================================================
# Configuration for video output and rendering settings
video_parameters:
  # Whether to record the visualization as a video file
  # If true, output_file, video_width_px, and video_height_px are required
  # If false, only an interactive window will be shown
  record_video: true

  # Output video file path (REQUIRED if record_video is true)
  # Supported formats: .avi (recommended), .mp4
  output_file: "results/output_video.avi"

  # Video frame rate in frames per second (ALWAYS REQUIRED)
  # Typical values: 24, 25, 30, or 60 fps
  video_fps: 25.0

  # Video width in pixels (REQUIRED if record_video is true)
  # Common resolutions: 1920 (Full HD), 1280 (HD), 1140 (custom)
  video_width_px: 1920

  # Video height in pixels (REQUIRED if record_video is true)
  # Common resolutions: 1080 (Full HD), 720 (HD), 900 (custom)
  video_height_px: 1080

# ================================================================================
# TRAFFIC SIGNALS (REQUIRED)
# ================================================================================
# Configuration for traffic light and ramp metering visualization
traffic_signals:
  # Whether ramp metering (traffic control at highway on-ramps) is enabled
  # If true, design and ramp parameters are required
  # If false, traffic lights won't be rendered but other fields are still needed
  ramp_metering: false

  # Traffic light design type (REQUIRED if ramp_metering is true)
  # Available options:
  #   - simple: Basic two-light ramp metering (red/green)
  #   - three_headed: Standard three-light traffic signal (red/yellow/green)
  #   - countdown_timer: Ramp metering with countdown display
  design: simple

  # Ramp metering physical configuration (REQUIRED if ramp_metering is true)
  ramp:
    # X coordinate of traffic light position in the SUMO network
    pos_x: 0.0

    # Y coordinate of traffic light position in the SUMO network
    pos_y: 0.0

    # Coordinates defining the stop line (where vehicles must stop)
    # These four values define two points (a,b) and (c,d) for the line endpoints
    stop_line_a: 0.0
    stop_line_b: 0.0
    stop_line_c: 0.0
    stop_line_d: 0.0

  # Path to the XML file containing traffic signal state changes over time
  # This file logs when signals change between red/yellow/green
  traffic_signal_states_file: "path/to/simulation_logs/signal_states.xml"

  # ID of the traffic light in the SUMO network to visualize
  # This should match a traffic light ID in the network file
  traffic_light_id: "tl_junction_id"

# ================================================================================
# VISUALIZATION PARAMETERS (REQUIRED)
# ================================================================================
# Configuration for visual elements and scene composition
visualization_parameters:
  # Whether to render other vehicles in the scene besides the ego vehicle
  show_other_vehicles: true

  # Camera/viewer height above ground level in meters
  # Typical values: 1.5m (sitting in car), 2.0m (standing), 10.0m (aerial view)
  viewer_height: 1.5

  # ======================================
  # Optional environment element files
  # ======================================
  # The following files are OPTIONAL - if not needed, you can omit these lines
  # or leave them empty. The renderer will skip them if the files don't exist.

  # Path to XML file defining tree positions in the environment
  tree_positions_file: "path/to/viz_object_positions/trees.add.xml"

  # Path to XML file defining highway fence/barrier positions
  fence_lines_file: "path/to/viz_object_positions/fences.add.xml"

  # Path to XML file defining shop/commercial building positions
  shops_positions_file: "path/to/viz_object_positions/buildings_shops.add.xml"

  # Path to XML file defining residential home positions
  homes_positions_file: "path/to/viz_object_positions/buildings_homes.add.xml"

  # Path to XML file defining large building block positions
  blocks_positions_file: "path/to/viz_object_positions/buildings_blocks.add.xml"

  # ======================================
  # Sky texture selection (REQUIRED)
  # ======================================
  # Choose the sky appearance for the scene
  # Available options:
  #   - sky_blue: Clear blue sky
  #   - sky_cloudy: Partly cloudy daytime sky
  #   - sky_overcast: Overcast/gray sky
  #   - sky_dawn: Dawn/dusk colors
  #   - sky_night_stars: Night sky with stars
  #   - sky_night_clear: Clear night sky
  #   - sky_night_forest: Night sky over forest
  #   - sky_night_desert: Night sky over desert
  #   - sky_halloween: Halloween-themed sky
  sky_texture: "sky_blue"

  # ======================================
  # Ground texture selection (REQUIRED)
  # ======================================
  # Choose the ground surface appearance
  # Available options:
  #   - ground_grass: Natural grass texture
  #   - ground_stone: Stone texture
  #   - ground_sand: Sand texture
  #   - ground_chess: Chess board pattern (small)
  #   - ground_chesslarge: Chess board pattern (large)
  #   - ground_halloween: Halloween-themed ground
  ground_texture: "ground_grass"
